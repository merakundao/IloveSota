<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>そーたくんへ</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#ffeef5,#ffffff);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.message-card{
  max-width:700px;
  border-radius:20px;
}

#text{
  white-space:pre-line;
  font-size:1.2rem;
  line-height:1.9;
}
</style>
</head>

<body>

<div class="container">
  <div class="card shadow-lg p-4 message-card mx-auto">
    
    <h2 class="text-center mb-4">そーたくんへ</h2>

    <div id="text"></div>

  </div>
</div>

<script>
const message = `そーたくん、いつもありがとう。

声を聞いた時は「あ、この人ダメかも、、」と思ってしまったけれど、
LINEで話しているうちに「この人めっちゃ優しくて好き！」という感情に変わっていた。

僕にとって必要な人物だと確信を持ったんだ。
もしいなくなったら多分僕は夜しか眠れない人なってたと思う。

そーたくんいつもこんな私に話しかけてくれて
そっと微笑んでくれていつもありがとう。

ホワイトデー楽しみにしてるよ ❤️`;

let i = 0;

function typeWriter(){
  if(i < message.length){
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

typeWriter();
</script>

</body>
</html>
